version: "2"
run:
  build-tags:
    - deadlock
    - integration
  tests: true
linters:
  default: none
  enable:
    - asasalint
    - depguard
    - dupl
    - errname
    - fatcontext
    - forbidigo
    - goconst
    - govet
    - misspell
    - nilerr
    - revive
    - staticcheck
  settings:
    depguard:
      rules:
        protojson:
          deny:
            - pkg: google.golang.org/protobuf/encoding/protojson
              desc: use github.com/livekit/protocol/utils/protojson instead — it sets DiscardUnknown by default to avoid schema-drift footguns
    forbidigo:
      forbid:
        - pattern: sync\.Mutex
        - pattern: sync\.RWMutex
      analyze-types: true
    staticcheck:
      checks:
        - "all"
        - "-ST1000" # package comments — not useful for internal packages
        - "-ST1003" # naming conventions — would break exported API
    misspell:
      mode: default
      locale: US
    revive:
      confidence: 0.8
      severity: warning
      rules:
        - name: argument-limit
        - name: atomic
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: deep-exit
        - name: defer
        - name: dot-imports
        - name: early-return
        - name: errorf
        - name: error-strings
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: range-val-address
        - name: receiver-naming
        - name: superfluous-else
        - name: unexported-return
        - name: unused-parameter
        - name: var-declaration
        - name: waitgroup-by-value
        - name: datarace
        - name: identical-branches
        - name: identical-switch-branches
        - name: unconditional-recursion
        - name: unreachable-code 
        - name: empty-block
  exclusions:
    generated: strict
    rules:
      - path: cmd/server/main.go
        text: 'pattern templates: no matching files found'
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
