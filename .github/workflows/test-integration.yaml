name: Integration Test
on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - build/chrome/**
      - build/egress/**
      - build/gstreamer/**
      - build/test/**
      - cmd/**
      - pkg/**
      - test/**
      - go.mod

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: namespace-profile-8vcpu-cache
    outputs:
      image: ${{ steps.docker-md.outputs.tags }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: Fetch media-samples (with LFS)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: build/test/fetch-media-samples.sh

      - uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/go/bin
            ~/.cache
          key: egress-integration-${{ hashFiles('**/go.sum') }}
          restore-keys: egress-integration

      - name: Docker metadata
        id: docker-md
        uses: docker/metadata-action@v6
        with:
          images: livekit/egress-integration
          tags: |
            type=sha

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.2

      - name: Download Go modules
        run: go mod download

      - name: Get template image
        id: template-tag
        run: |
          TEMPLATE_TAG=`go run github.com/livekit/egress/cmd/template_version`
          echo "template_tag=$TEMPLATE_TAG" > "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
          install: true

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./build/test/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.docker-md.outputs.tags }}
          labels: ${{ steps.docker-md.outputs.labels }}
          build-args: |
            DEADLOCK=1
            TEMPLATE_TAG=${{ steps.template-tag.outputs.template_tag }}
          # TODO: Enable caching once registry periodic cleanup is implemented
          #cache-from: type=registry,ref=livekit/egress-integration:buildcache
          #cache-to:   type=registry,ref=livekit/egress-integration:buildcache,mode=max,ignore-error=true

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        integration_type: [file-room, file-track, file-media, stream, segments, images, multi, edge]
    runs-on: namespace-profile-8vcpu-cache
    steps:
      - uses: shogo82148/actions-setup-redis@v1
        with:
          redis-version: '6.x'
          auto-start: true
      - run: redis-cli ping

      - name: Run tests
        env:
          IMAGE: ${{needs.build.outputs.image}}
        run: |
          set -o pipefail
          docker run --rm \
            --network host \
            -e GITHUB_WORKFLOW=1 \
            -e EGRESS_CONFIG_STRING="$(echo ${{ secrets.EGRESS_CONFIG_STRING }} | base64 -d)" \
            -e INTEGRATION_TYPE="${{ matrix.integration_type }}" \
            -e S3_UPLOAD="$(echo ${{ secrets.S3_UPLOAD }} | base64 -d)" \
            -e GCP_UPLOAD="$(echo ${{ secrets.GCP_UPLOAD }} | base64 -d)" \
            ${{ env.IMAGE }} \
            2>&1 | tee /tmp/test-output.log

      - name: Extract avsync stats
        if: always()
        run: |
          # Extract the JSON block from sentinel markers; fall back to []
          # so the artifact always exists.
          awk '/===AVSYNC_STATS_BEGIN===/{flag=1; next} /===AVSYNC_STATS_END===/{flag=0} flag' \
            /tmp/test-output.log > /tmp/avsync-stats.json
          if [ ! -s /tmp/avsync-stats.json ]; then
            echo "[]" > /tmp/avsync-stats.json
          fi
          echo "Stats rows: $(jq 'length' /tmp/avsync-stats.json)"

      - name: Upload avsync stats artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: avsync-stats-${{ matrix.integration_type }}
          path: /tmp/avsync-stats.json

  summary:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download avsync stats artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: avsync-stats-*
          path: stats/

      - name: Render avsync summary
        run: |
          # Merge all per-job JSON arrays into one, sorted by score desc.
          jq -s '[.[][]] | sort_by(-.score)' stats/*/avsync-stats.json \
            > /tmp/merged.json || echo "[]" > /tmp/merged.json

          if [ "$(jq 'length' /tmp/merged.json)" = "0" ]; then
            {
              echo "## avsync stats summary"
              echo
              echo "_no stats collected_"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## avsync stats summary"
            echo
            echo "Sorted by score desc; \`N/A\` = metric doesn't apply. Full per-test detail in the per-job artifacts."
            echo
            echo "**Columns:**"
            echo "- \`audioJitter\` — std dev of beep-to-beep spacing (1Hz cadence). Lower = steadier audio rate."
            echo "- \`videoJitter\` — std dev of flash-to-flash spacing. Lower = steadier video rate."
            echo "- \`stableAVSync\` — median offset between flashes and nearest beeps (signed; positive = video lags audio)."
            echo "- \`avSyncStdDev\` — std dev of AV-sync offset across the recording. Lower = sync drifts less."
            echo "- \`maxAVSync\` — largest single AV-sync offset seen."
            echo "- \`missed\` — events the cadence dropped (gap ≥ 1.5s) on either track."
            echo "- \`unmatched\` — flashes/beeps with no peer within the AV-sync tolerance."
            echo
            echo "| test | type | source | layout | score | audioJitter | videoJitter | stableAVSync | avSyncStdDev | maxAVSync | missed | unmatched |"
            echo "|---|---|---|---|---:|---:|---:|---:|---:|---:|---:|---:|"
            jq -r '
              .[] |
              # missed: per-side null falls back to 0. unmatched: N/A when AV-sync didn't apply.
              ((.missedFlashes // 0) + (.missedBeeps // 0)) as $missed |
              (if .unmatchedFlashes == null then "N/A"
                else (.unmatchedFlashes + .unmatchedBeeps) | tostring end) as $unmatched |
              "| \(.test) | \(.requestType) | \(.source // "") | \(.layout // "") | \(.score) | \(.spacingStdDevAudio // "N/A") | \(.spacingStdDevVideo // "N/A") | \(.stableAVSync // "N/A") | \(.avSyncStdDev // "N/A") | \(.maxAVSync // "N/A") | \($missed) | \($unmatched) |"
            ' /tmp/merged.json
          } >> "$GITHUB_STEP_SUMMARY"
